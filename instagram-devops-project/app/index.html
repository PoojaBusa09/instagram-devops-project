<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        Instagram Clone
    </header>

    <!-- Main Content -->
    <main>

        <!-- Post -->
        <div class="post">
            <img src="https://source.unsplash.com/400x400/?nature" alt="Nature Image">
            <div class="post-content">
                <p>Beautiful Nature 🌿</p>
            </div>
        </div>

        <!-- Another Post (optional example) -->
        <div class="post">
            <img src="https://source.unsplash.com/400x400/?mountains" alt="Mountain Image">
            <div class="post-content">
                <p>Amazing Mountains ⛰️</p>
            </div>
        </div>

    </main>

</body>
</html>
